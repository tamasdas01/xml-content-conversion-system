<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <title>Question Bank Summary</title>
    <style>
          body { font-family: Arial, sans-serif; margin: 30px; line-height: 1.6; }
          h1 { color: #2c3e50; }
          .summary-card { background: #ecf0f1; padding: 20px; border-radius: 8px; width: 300px; display: inline-block; margin: 10px; vertical-align: top; }
          .stat { font-size: 1.2em; font-weight: bold; }
        </style>
  </head>
  <body>
    <h1>Question Bank Summary Report</h1>
    <div class="summary-card">
      <h3>Total Questions</h3>

    </div>
    <div class="summary-card">
      <h3>Questions by Difficulty</h3>
      <ul>
        <li>Easy: <strong>8</strong></li>
        <li>Medium: <strong>4</strong></li>
        <li>Hard: <strong>0</strong></li>
      </ul>
    </div>
    <div class="summary-card">
      <h3>Questions by Subject</h3>
      <ul>
        <li>Biology: <strong>3</strong></li>
        <li>Physics: <strong>3</strong></li>
        <li>Chemistry: <strong>3</strong></li>
        <li>Mathematics: <strong>3</strong></li>
      </ul>
    </div>
  </body>
</html>
